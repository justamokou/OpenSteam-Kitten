name: Auto Update OpenSteamTool DLLs

on:
  schedule:
    # GitHub 的 schedule 是 best-effort，可能延迟或偶发跳过；需要时可手动触发。
    - cron: '23 */2 * * *'
  workflow_dispatch:

concurrency:
  group: auto-update-dlls
  cancel-in-progress: false

jobs:
  check-and-update:
    if: github.repository == 'justamokou/OpenSteam-Kitten'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Get latest OpenSteamTool release
        id: upstream
        run: |
          set -uo pipefail
          RESPONSE=$(curl -fsS https://api.github.com/repos/OpenSteam001/OpenSteamTool/releases/latest || true)
          if [ -z "$RESPONSE" ]; then
            echo "上游 API 请求失败（可能被限流），本次跳过"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG=$(echo "$RESPONSE" | jq -r '.tag_name // empty')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '[.assets[] | select(.name | endswith("-Release.zip")) | .browser_download_url][0] // empty')
          LATEST_TAG="${LATEST_TAG#v}"

          echo "tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          echo "url=$DOWNLOAD_URL" >> "$GITHUB_OUTPUT"
          echo "OpenSteamTool latest version: $LATEST_TAG"
          echo "Download URL: $DOWNLOAD_URL"

      - name: Download and validate upstream DLLs
        id: incoming
        if: steps.upstream.outputs.tag != '' && steps.upstream.outputs.url != ''
        run: |
          set -euo pipefail
          mkdir -p incoming extracted
          wget -q "${{ steps.upstream.outputs.url }}" -O opensteamtool.zip
          unzip -q opensteamtool.zip -d extracted

          for dll in OpenSteamTool.dll dwmapi.dll xinput1_4.dll; do
            mapfile -t matches < <(find extracted -type f -name "$dll")
            if [ "${#matches[@]}" -ne 1 ]; then
              echo "期望找到 1 个 $dll，实际找到 ${#matches[@]} 个"
              printf '%s\n' "${matches[@]}"
              exit 1
            fi
            cp -f "${matches[0]}" "incoming/$dll"
            if [ ! -s "incoming/$dll" ]; then
              echo "$dll 为空，拒绝继续"
              exit 1
            fi
            sha256sum "incoming/$dll"
          done

          printf '%s' "${{ steps.upstream.outputs.tag }}" > incoming/VERSION.txt
          sha256sum incoming/VERSION.txt
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - name: Check if update needed
        id: check
        run: |
          set -euo pipefail

          increment_last_version() {
            local version="$1"
            IFS='.' read -ra parts <<< "$version"
            local last_index=$((${#parts[@]} - 1))
            local last="${parts[$last_index]:-0}"
            if ! [[ "$last" =~ ^[0-9]+$ ]]; then
              echo "当前版本号最后一段不是数字：$version" >&2
              exit 1
            fi
            parts[$last_index]=$((last + 1))
            local joined="${parts[0]}"
            for ((i=1; i<${#parts[@]}; i++)); do
              joined="${joined}.${parts[$i]}"
            done
            printf '%s\n' "$joined"
          }

          CURRENT_CORE_VERSION="$(cat OpenSteamKitten/Resources/dlls/VERSION.txt 2>/dev/null | tr -d '[:space:]' || true)"
          UPSTREAM_VERSION="${{ steps.upstream.outputs.tag }}"
          INCOMING_READY="${{ steps.incoming.outputs.ready }}"

          echo "Current core: [$CURRENT_CORE_VERSION]"
          echo "Upstream core: [$UPSTREAM_VERSION]"

          if [ -z "$UPSTREAM_VERSION" ] || [ "$UPSTREAM_VERSION" = "null" ] || [ "$INCOMING_READY" != "true" ]; then
            echo "need_update=false" >> "$GITHUB_OUTPUT"
            echo "上游信息或产物缺失，跳过"
            exit 0
          fi

          HIGHEST=$(printf '%s\n%s\n' "$CURRENT_CORE_VERSION" "$UPSTREAM_VERSION" | sort -V | tail -1)
          SAME_VERSION=false
          VERSION_NEWER=false
          if [ "$CURRENT_CORE_VERSION" = "$UPSTREAM_VERSION" ]; then
            SAME_VERSION=true
          elif [ "$HIGHEST" = "$UPSTREAM_VERSION" ]; then
            VERSION_NEWER=true
          fi

          CONTENT_CHANGED=false
          for file in OpenSteamTool.dll dwmapi.dll xinput1_4.dll VERSION.txt; do
            if ! cmp -s "incoming/$file" "OpenSteamKitten/Resources/dlls/$file"; then
              CONTENT_CHANGED=true
              echo "文件内容变化: $file"
            fi
          done

          if [ "$VERSION_NEWER" != "true" ] && { [ "$SAME_VERSION" != "true" ] || [ "$CONTENT_CHANGED" != "true" ]; }; then
            echo "need_update=false" >> "$GITHUB_OUTPUT"
            echo "无需更新：上游版本不高于本地，且同版本文件未变化"
            exit 0
          fi

          CURRENT_KITTEN_VERSION="$(cat VERSION 2>/dev/null | tr -d '[:space:]' || echo "1.4.0")"
          NEW_KITTEN_VERSION="$(increment_last_version "$CURRENT_KITTEN_VERSION")"

          echo "need_update=true" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_KITTEN_VERSION" >> "$GITHUB_OUTPUT"
          echo "same_core_version=$SAME_VERSION" >> "$GITHUB_OUTPUT"
          echo "content_changed=$CONTENT_CHANGED" >> "$GITHUB_OUTPUT"
          echo "New kitten version: $NEW_KITTEN_VERSION"

      - name: Apply incoming DLLs and write source manifest
        if: steps.check.outputs.need_update == 'true'
        run: |
          set -euo pipefail

          digest_json() {
            local path="$1"
            local sha size
            sha=$(sha256sum "$path" | awk '{print $1}')
            size=$(stat -c '%s' "$path")
            jq -n --arg sha "$sha" --argjson size "$size" '{sha256:$sha,size:$size}'
          }

          manifest_json() {
            local shell="$1"
            local core="$2"
            local package_json="$3"
            local files='{}'
            shift 3
            while [ "$#" -gt 0 ]; do
              local rel="$1"
              local path="$2"
              shift 2
              local digest
              digest=$(digest_json "$path")
              files=$(jq -c --arg rel "$rel" --argjson digest "$digest" '. + {($rel): $digest}' <<< "$files")
            done
            jq -n \
              --arg shell "$shell" \
              --arg core "$core" \
              --argjson package "$package_json" \
              --argjson files "$files" \
              '{schema:1,shell:$shell,core:$core,package:$package,files:$files}'
          }

          cp -f incoming/OpenSteamTool.dll OpenSteamKitten/Resources/dlls/
          cp -f incoming/dwmapi.dll OpenSteamKitten/Resources/dlls/
          cp -f incoming/xinput1_4.dll OpenSteamKitten/Resources/dlls/
          cp -f incoming/VERSION.txt OpenSteamKitten/Resources/dlls/
          printf '%s' "${{ steps.check.outputs.new_version }}" > VERSION

          manifest_json \
            "${{ steps.check.outputs.new_version }}" \
            "${{ steps.upstream.outputs.tag }}" \
            'null' \
            "VERSION" "VERSION" \
            "Resources/dlls/OpenSteamTool.dll" "OpenSteamKitten/Resources/dlls/OpenSteamTool.dll" \
            "Resources/dlls/dwmapi.dll" "OpenSteamKitten/Resources/dlls/dwmapi.dll" \
            "Resources/dlls/xinput1_4.dll" "OpenSteamKitten/Resources/dlls/xinput1_4.dll" \
            "Resources/dlls/VERSION.txt" "OpenSteamKitten/Resources/dlls/VERSION.txt" \
            > OpenSteamKitten/version.json

          jq . OpenSteamKitten/version.json

      - name: Setup .NET
        if: steps.check.outputs.need_update == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Build Release
        if: steps.check.outputs.need_update == 'true'
        run: |
          dotnet publish OpenSteamKitten/OpenSteamKitten.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            /p:PublishSingleFile=true \
            -o dist/publish

      - name: Create ZIP package and release manifest
        if: steps.check.outputs.need_update == 'true'
        run: |
          set -euo pipefail

          digest_json() {
            local path="$1"
            local sha size
            sha=$(sha256sum "$path" | awk '{print $1}')
            size=$(stat -c '%s' "$path")
            jq -n --arg sha "$sha" --argjson size "$size" '{sha256:$sha,size:$size}'
          }

          manifest_json() {
            local shell="$1"
            local core="$2"
            local package_json="$3"
            local files='{}'
            shift 3
            while [ "$#" -gt 0 ]; do
              local rel="$1"
              local path="$2"
              shift 2
              local digest
              digest=$(digest_json "$path")
              files=$(jq -c --arg rel "$rel" --argjson digest "$digest" '. + {($rel): $digest}' <<< "$files")
            done
            jq -n \
              --arg shell "$shell" \
              --arg core "$core" \
              --argjson package "$package_json" \
              --argjson files "$files" \
              '{schema:1,shell:$shell,core:$core,package:$package,files:$files}'
          }

          package_json() {
            local name="$1"
            local path="$2"
            local sha size
            sha=$(sha256sum "$path" | awk '{print $1}')
            size=$(stat -c '%s' "$path")
            jq -n --arg name "$name" --arg sha "$sha" --argjson size "$size" '{name:$name,sha256:$sha,size:$size}'
          }

          mkdir -p dist
          ZIP_NAME="OpenSteamKitten-${{ steps.check.outputs.new_version }}-Release.zip"
          ZIP_PATH="dist/$ZIP_NAME"

          manifest_json \
            "${{ steps.check.outputs.new_version }}" \
            "${{ steps.upstream.outputs.tag }}" \
            'null' \
            "OpenSteamKitten.exe" "dist/publish/OpenSteamKitten.exe" \
            "VERSION" "dist/publish/VERSION" \
            "Resources/dlls/OpenSteamTool.dll" "dist/publish/Resources/dlls/OpenSteamTool.dll" \
            "Resources/dlls/dwmapi.dll" "dist/publish/Resources/dlls/dwmapi.dll" \
            "Resources/dlls/xinput1_4.dll" "dist/publish/Resources/dlls/xinput1_4.dll" \
            "Resources/dlls/VERSION.txt" "dist/publish/Resources/dlls/VERSION.txt" \
            > dist/publish/version.json

          cd dist/publish
          zip -r "../$ZIP_NAME" OpenSteamKitten.exe VERSION version.json Resources/
          cd ../..

          PKG_JSON=$(package_json "$ZIP_NAME" "$ZIP_PATH")
          manifest_json \
            "${{ steps.check.outputs.new_version }}" \
            "${{ steps.upstream.outputs.tag }}" \
            "$PKG_JSON" \
            "OpenSteamKitten.exe" "dist/publish/OpenSteamKitten.exe" \
            "VERSION" "dist/publish/VERSION" \
            "Resources/dlls/OpenSteamTool.dll" "dist/publish/Resources/dlls/OpenSteamTool.dll" \
            "Resources/dlls/dwmapi.dll" "dist/publish/Resources/dlls/dwmapi.dll" \
            "Resources/dlls/xinput1_4.dll" "dist/publish/Resources/dlls/xinput1_4.dll" \
            "Resources/dlls/VERSION.txt" "dist/publish/Resources/dlls/VERSION.txt" \
            > dist/publish/version.json

          jq . dist/publish/version.json
          ls -lh "$ZIP_PATH" dist/publish/version.json

      - name: Commit DLL updates
        if: steps.check.outputs.need_update == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add OpenSteamKitten/Resources/dlls/ VERSION OpenSteamKitten/version.json
          git diff --cached --quiet || git commit -m "Auto-update: OpenSteamTool ${{ steps.upstream.outputs.tag }} -> Kitten v${{ steps.check.outputs.new_version }}"
          git push

      - name: Create Release
        if: steps.check.outputs.need_update == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.check.outputs.new_version }}
          name: v${{ steps.check.outputs.new_version }} - 内核更新 (OpenSteamTool ${{ steps.upstream.outputs.tag }})
          body: |
            ## v${{ steps.check.outputs.new_version }} - 内核自动更新

            ### 更新内容
            - 同步 OpenSteamTool ${{ steps.upstream.outputs.tag }} 核心文件
            - 更新 `OpenSteamTool.dll`、`dwmapi.dll`、`xinput1_4.dll`
            - 发布清单 `version.json` 包含 zip 与关键文件 SHA256，用于客户端校验

            ### 版本信息
            - OpenSteam Kitten: v${{ steps.check.outputs.new_version }}
            - OpenSteamTool 内核: ${{ steps.upstream.outputs.tag }}

            ### 下载
            下载 `OpenSteamKitten-${{ steps.check.outputs.new_version }}-Release.zip` 并解压到任意位置，运行 `OpenSteamKitten.exe` 即可。

            必须保持 `OpenSteamKitten.exe` 和 `Resources` 文件夹在同一目录下。建议放在可写目录（桌面/Documents 等），以便使用程序内置的自动更新功能。

            首次运行如提示需要 .NET 6 Desktop Runtime，Windows 会自动引导安装。

            ### 使用说明
            - `.lua` 文件 -> 自动放到 `Steam\config\lua\`
            - `.manifest` 文件 -> 自动放到 `Steam\config\depotcache\`
            - 按住 `Ctrl` 拖拽 -> 删除对应文件

            ### 系统要求
            - Windows 10/11
            - .NET 6 Desktop Runtime
            - 已安装 Steam

            ---

            本版本由 GitHub Actions 自动构建并发布。
            上游更新日志：https://github.com/OpenSteam001/OpenSteamTool/releases/tag/v${{ steps.upstream.outputs.tag }}
          files: |
            dist/OpenSteamKitten-${{ steps.check.outputs.new_version }}-Release.zip
            dist/publish/version.json
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Try deleting this empty scheduled run
        if: steps.check.outputs.need_update != 'true' && github.event_name == 'schedule'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # GitHub normally does not allow a still-running workflow to reliably delete itself.
          # Keep this as best-effort; completed no-update runs may still remain in the Actions UI.
          gh api -X DELETE "repos/${{ github.repository }}/actions/runs/${{ github.run_id }}"
